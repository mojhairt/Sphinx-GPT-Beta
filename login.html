<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Sphinx-SCA</title>
    <meta name="description" content="Log in to your Sphinx-SCA account to access your AI math solver and assistant.">
    <link rel="icon" type="image/png" href="/logo.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-theme');
            }
        })();
    </script>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-primary);
            padding: var(--space-5);
        }

        .auth-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: var(--space-10);
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            animation: fadeInUp 0.5s ease;
        }

        .auth-header-links {
            position: absolute;
            top: var(--space-6);
            left: var(--space-6);
        }

        .back-home {
            color: var(--text-muted);
            font-size: var(--font-small);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color var(--transition-fast);
        }

        .back-home:hover {
            color: var(--primary);
        }

        .back-home .material-symbols-outlined {
            font-size: 16px;
        }

        .auth-logo {
            width: 56px;
            height: 56px;
            margin: var(--space-3) auto var(--space-5);
            object-fit: contain;
        }

        .form-title {
            font-size: var(--font-h2);
            font-weight: 700;
            margin-bottom: var(--space-2);
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .form-subtitle {
            font-size: var(--font-body);
            color: var(--text-secondary);
            margin-bottom: var(--space-7);
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: var(--space-5);
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: var(--font-small);
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: var(--space-2);
        }

        .login-input {
            width: 100%;
            height: 52px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 0 var(--space-4);
            font-family: var(--font-family);
            font-size: var(--font-body);
            outline: none;
            transition: all var(--transition-fast);
            appearance: none;
            -webkit-appearance: none;
        }

        .dark-theme .login-input {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            color-scheme: dark;
        }

        .dark-theme .login-input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px var(--bg-primary) inset !important;
            -webkit-text-fill-color: var(--text-primary) !important;
        }

        .login-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .login-input::placeholder {
            color: var(--text-muted);
        }

        .forgot-password {
            display: block;
            text-align: right;
            color: var(--primary);
            font-size: var(--font-small);
            font-weight: 600;
            margin-top: calc(-1 * var(--space-3));
            margin-bottom: var(--space-5);
            transition: opacity var(--transition-fast);
        }

        .forgot-password:hover {
            opacity: 0.8;
        }

        .login-btn {
            width: 100%;
            height: 52px;
            border-radius: var(--radius-lg);
            background: var(--primary);
            color: #ffffff;
            font-weight: 600;
            font-size: var(--font-body);
            border: none;
            cursor: pointer;
            transition: all var(--transition-fast);
            margin-top: var(--space-2);
        }

        .login-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            margin: var(--space-6) 0;
            color: var(--text-muted);
            font-size: var(--font-xs);
            font-weight: 600;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .auth-divider span {
            padding: 0 var(--space-3);
        }

        .oauth-container {
            display: flex;
            gap: var(--space-3);
            justify-content: center;
            margin-bottom: var(--space-7);
        }

        .oauth-btn {
            width: 52px;
            height: 52px;
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .oauth-btn:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .oauth-icon {
            width: 22px;
            height: 22px;
        }

        .auth-footer {
            font-size: var(--font-small);
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
            margin-left: 4px;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            body {
                align-items: flex-start;
                padding: 0;
            }

            .auth-card {
                border: none;
                border-radius: 0;
                box-shadow: none;
                max-width: 100%;
                min-height: 100vh;
                padding: var(--space-10) var(--space-6) var(--space-8);
            }

            .auth-header-links {
                position: relative;
                top: 0;
                left: 0;
                margin-bottom: var(--space-5);
            }
        }
    </style>
</head>

<body>
    <script>
        if (document.documentElement.classList.contains('dark-theme')) {
            document.body.classList.add('dark-theme');
        }
    </script>

    <div class="auth-card">
        <div class="auth-header-links">
            <a href="index.html" class="back-home">
                <span class="material-symbols-outlined">arrow_back</span>
                Back
            </a>
        </div>

        <img src="logo.png" alt="Sphinx-SCA" class="auth-logo">
        <h2 class="form-title">Welcome Back</h2>
        <p class="form-subtitle">Log in to your Sphinx-SCA account.</p>

        <form id="login-form">
            <div class="input-group">
                <label class="input-label">Email Address</label>
                <input type="email" id="login-email" class="login-input" placeholder="student@university.edu" required>
            </div>

            <div class="input-group">
                <label class="input-label">Password</label>
                <input type="password" id="login-password" class="login-input" placeholder="••••••••" required>
            </div>

            <a href="#" class="forgot-password">Forgot Password?</a>

            <button type="submit" class="login-btn">Log In</button>
            <p id="login-error" style="color: #EF4444; font-size: 13px; margin-top: 12px; display: none;"></p>
        </form>

        <div class="auth-divider">
            <span>OR CONTINUE WITH</span>
        </div>

        <div class="oauth-container">
            <button class="oauth-btn" id="google-login-btn" type="button" aria-label="Google" title="Google">
                <svg class="oauth-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
            </button>

            <button class="oauth-btn" id="github-login-btn" type="button" aria-label="GitHub" title="GitHub">
                <svg class="oauth-icon" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                </svg>
            </button>

            <button class="oauth-btn" id="facebook-login-btn" type="button" aria-label="Facebook" title="Facebook">
                <svg class="oauth-icon" viewBox="0 0 24 24">
                    <path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                </svg>
            </button>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="signup.html">Sign up</a>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        // Check if user is already logged in
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = 'dashboard.html';
            }
        });

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorMsg = document.getElementById('login-error');

            const btn = document.querySelector('.login-btn');
            const originalText = btn.textContent;
            btn.textContent = 'Logging In...';
            btn.disabled = true;

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            btn.textContent = originalText;
            btn.disabled = false;

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = "block";
            } else {
                window.location.href = 'dashboard.html';
            }
        });

        // OAuth Logic
        async function handleOAuth(provider) {
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: provider,
                options: {
                    redirectTo: window.location.origin + '/dashboard.html'
                }
            });

            if (error) {
                console.error(`${provider} login error:`, error.message);
                return;
            }
        }

        document.getElementById('google-login-btn').addEventListener('click', () => handleOAuth('google'));
        document.getElementById('github-login-btn').addEventListener('click', () => handleOAuth('github'));
        document.getElementById('facebook-login-btn').addEventListener('click', () => handleOAuth('facebook'));
    </script>
</body>

</html>
