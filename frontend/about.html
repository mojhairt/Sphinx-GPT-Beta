<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | Sphinx-SCA</title>
    <meta name="description" content="Meet the team behind Sphinx-SCA — the AI-powered math solver built by passionate engineers.">
    <link rel="icon" type="image/png" href="/logo.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Theme Initialization -->
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-theme');
            }
        })();
    </script>

    <!-- Material Icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link rel="stylesheet" href="/styles/style.css">
</head>

<body class="app-page">
    <script>
        if (document.documentElement.classList.contains('dark-theme')) {
            document.body.classList.add('dark-theme');
        }
    </script>
    <div class="app-layout">
        <!-- Main Sidebar -->
        <aside class="main-sidebar collapsed" id="main-sidebar">
            <div class="sidebar-top">
                <button class="menu-toggle-btn" id="sidebar-toggle-btn">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>

            <div class="sidebar-action">
                <button class="new-chat-sidebar-btn" onclick="window.location.href='index.html';">
                    <span class="material-symbols-outlined">add</span>
                    <span class="btn-text">New chat</span>
                </button>
            </div>

            <div class="sidebar-scrollable">
                <div class="sidebar-section hover-expand">
                    <div class="section-header">
                        <span class="material-symbols-outlined section-icon">history</span>
                        <span class="section-title">Recent</span>
                    </div>
                    <ul class="sidebar-history-list" id="sidebar-history-list">
                    </ul>
                </div>
            </div>

            <div class="sidebar-bottom">
                <a href="index.html" class="sidebar-nav-item">
                    <span class="material-symbols-outlined">home</span>
                    <span class="item-text">Home</span>
                </a>
                <a href="dashboard.html" class="sidebar-nav-item">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span class="item-text">Dashboard</span>
                </a>
                <a href="about.html" class="sidebar-nav-item active">
                    <span class="material-symbols-outlined">info</span>
                    <span class="item-text">About</span>
                </a>
            </div>
        </aside>

        <!-- Overlay for mobile sidebar -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Content Area -->
        <div class="main-content-wrapper">
            <header class="header">
                <button class="mobile-left-menu-btn" id="mobile-left-menu-btn" style="display: none;">
                    <span class="material-symbols-outlined" style="font-size: 24px;">menu</span>
                </button>
                <div class="logo-container" onclick="window.location.href='index.html'">
                    <img src="/logo.png" alt="Sphinx-SCA Logo" class="logo-icon">
                    <div class="logo-text">
                        <span class="logo-sphinx">Sphinx</span><span class="logo-sca">-SCA</span>
                    </div>
                </div>

                <nav class="nav">
                    <button class="nav-theme-toggle" id="theme-toggle-btn" title="Toggle Dark/Light Mode">
                        <span class="material-symbols-outlined theme-icon">dark_mode</span>
                    </button>
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="about.html" class="nav-link" style="color: var(--primary)">About</a>
                    <a href="login.html" class="nav-link" id="nav-login-btn">Log in</a>

                    <div class="profile-container" id="nav-profile-container">
                        <div class="nav-profile" id="nav-user-avatar" title="Your Account"></div>
                        <div class="profile-dropdown">
                            <a href="dashboard.html" class="dropdown-item">
                                <span class="material-symbols-outlined">person</span>
                                Profile
                            </a>
                            <a href="#" class="dropdown-item logout" id="logout-btn">
                                <span class="material-symbols-outlined">logout</span>
                                Log Out
                            </a>
                        </div>
                    </div>
                </nav>
            </header>

            <main class="scrollable-content" style="flex: 1; overflow-y: auto;">
                <section class="about-hero">
                    <h1 class="about-title">Meet Our Team</h1>
                    <p style="color: var(--text-secondary); font-size: var(--font-body); max-width: 500px; margin: 0 auto; line-height: 1.6;">
                        The passionate engineers and designers behind Sphinx-SCA.
                    </p>
                </section>

                <!-- React Team Section Revamp -->
                <section class="department-section">
                    <div id="team-revamp-root"></div>
                </section>

                <script type="module" src="/src/team_revamp_entry.jsx"></script>

                <footer style="text-align: center; padding: 40px; color: var(--text-muted); font-size: var(--font-xs);">
                    &copy; 2026 Sphinx-SCA. All rights reserved.
                </footer>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { supabase } from './supabaseClient.js';

        document.addEventListener('DOMContentLoaded', async function () {
            // Sidebar Logic
            const mainSidebar = document.getElementById('main-sidebar');
            const sidebarToggleBtn = document.getElementById('sidebar-toggle-btn');
            const sidebarOverlay = document.getElementById('sidebar-overlay');
            const mobileLeftMenuBtn = document.getElementById('mobile-left-menu-btn');

            if (sidebarToggleBtn) {
                sidebarToggleBtn.addEventListener('click', () => {
                    if (window.innerWidth <= 768) {
                        mainSidebar.classList.remove('mobile-open');
                        sidebarOverlay.classList.remove('active');
                    } else {
                        mainSidebar.classList.toggle('collapsed');
                    }
                });
            }

            if (mobileLeftMenuBtn) {
                mobileLeftMenuBtn.addEventListener('click', () => {
                    mainSidebar.classList.add('mobile-open');
                    sidebarOverlay.classList.add('active');
                });
            }

            if (sidebarOverlay) {
                sidebarOverlay.addEventListener('click', () => {
                    mainSidebar.classList.remove('mobile-open');
                    sidebarOverlay.classList.remove('active');
                });
            }

            // Auth Logic
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                document.getElementById('nav-login-btn').style.display = 'none';
                const avatar = document.getElementById('nav-user-avatar');
                avatar.innerHTML = `<img src="/user.png" alt="User" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">`;
                document.getElementById('nav-profile-container').style.display = 'block';

                document.getElementById('logout-btn').addEventListener('click', async () => {
                    await supabase.auth.signOut();
                    window.location.reload();
                });
            }

            // Theme Toggle
            const themeToggleBtn = document.getElementById('theme-toggle-btn');
            if (themeToggleBtn) {
                const themeIcon = themeToggleBtn.querySelector('.theme-icon');
                // Update icon on load
                const isDarkNow = document.body.classList.contains('dark-theme');
                if (themeIcon) themeIcon.textContent = isDarkNow ? 'light_mode' : 'dark_mode';

                themeToggleBtn.addEventListener('click', () => {
                    document.documentElement.classList.toggle('dark-theme');
                    document.body.classList.toggle('dark-theme');
                    const isDark = document.body.classList.contains('dark-theme');
                    localStorage.setItem('theme', isDark ? 'dark' : 'light');
                    if (themeIcon) themeIcon.textContent = isDark ? 'light_mode' : 'dark_mode';
                });
            }
        });
    </script>
</body>

</html>
