<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Sphinx-SCA</title>
    <meta name="description" content="Create your Sphinx-SCA account and start solving math problems with AI.">
    <link rel="icon" type="image/png" href="/logo.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-theme');
            }
        })();
    </script>

    <link rel="stylesheet" href="/styles/style.css">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-primary);
            padding: var(--space-5);
        }

        /* Auth Card Premium Styling */
        .auth-card {
            background: rgba(23, 23, 23, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(217, 119, 87, 0.1); /* Subtle orange border */
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
            margin: var(--space-8) auto;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary); /* Use primary color for labels for high contrast */
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            text-align: left;
        }

        .login-input {
            width: 100%;
            height: 54px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(45, 45, 45, 0.4);
            color: var(--text-primary);
            padding: 0 20px;
            font-size: 15px;
            transition: all 0.25s ease;
        }

        .login-input:focus {
            border-color: var(--primary);
            background: rgba(45, 45, 45, 0.7);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .oauth-container {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 32px;
        }

        .oauth-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%; /* High fidelity circular buttons */
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--text-secondary);
        }

        .oauth-btn:hover {
            border-color: var(--primary);
            color: var(--text-primary);
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 8px 24px rgba(217, 119, 87, 0.2);
            background: rgba(217, 119, 87, 0.05);
        }

        .oauth-icon {
            width: 24px;
            height: 24px;
            transition: transform 0.3s ease;
        }

        .oauth-btn:hover .oauth-icon {
            transform: scale(1.1);
        }

        .auth-logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 24px;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(217, 119, 87, 0.3));
        }

        .auth-header-links {
            position: absolute;
            top: 24px;
            left: 24px;
        }

        .back-home {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .back-home:hover {
            color: var(--primary);
            transform: translateX(-2px);
        }

        .form-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .form-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            opacity: 0.8;
        }

        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .login-btn {
            width: 100%;
            height: 52px;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(217, 119, 87, 0.3);
        }

        .login-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(217, 119, 87, 0.4);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .auth-divider span {
            padding: 0 16px;
        }

        .auth-footer {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 16px;
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
            margin-left: 4px;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            body {
                padding: 0;
                align-items: flex-start;
            }

            .auth-card {
                max-width: 100%;
                min-height: 100vh;
                border: none;
                border-radius: 0;
                padding: 80px 24px 40px;
                margin: 0;
            }
        }
    </style>
</head>

<body>
    <script>
        if (document.documentElement.classList.contains('dark-theme')) {
            document.body.classList.add('dark-theme');
        }
    </script>

    <div class="auth-card">
        <div class="auth-header-links">
            <a href="/" class="back-home">
                <span class="material-symbols-outlined">arrow_back</span>
                Back
            </a>
        </div>

        <img src="/logo.png" alt="Sphinx-SCA" class="auth-logo">
        <h2 class="form-title">Create Account</h2>
        <p class="form-subtitle">Start solving math problems with AI.</p>

        <form id="signup-form">
            <div class="input-group">
                <label class="input-label">Full Name</label>
                <input type="text" id="signup-name" class="login-input" placeholder="e.g. John Doe" required>
            </div>

            <div class="input-group">
                <label class="input-label">Email Address</label>
                <input type="email" id="signup-email" class="login-input" placeholder="student@university.edu" required>
            </div>

            <div class="input-group">
                <label class="input-label">Password</label>
                <input type="password" id="signup-password" class="login-input" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label class="input-label">Confirm Password</label>
                <input type="password" id="signup-confirm" class="login-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Create Account</button>
            <p id="signup-error" style="color: #EF4444; font-size: 13px; margin-top: 12px; display: none;"></p>
        </form>

        <div class="auth-divider">
            <span>OR CONTINUE WITH</span>
        </div>

        <div class="oauth-container">
            <button class="oauth-btn" id="google-login-btn" type="button" aria-label="Google" title="Google">
                <svg class="oauth-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
            </button>

            <button class="oauth-btn" id="github-login-btn" type="button" aria-label="GitHub" title="GitHub">
                <svg class="oauth-icon" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                </svg>
            </button>

            <button class="oauth-btn" id="facebook-login-btn" type="button" aria-label="Facebook" title="Facebook">
                <svg class="oauth-icon" viewBox="0 0 24 24">
                    <path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                </svg>
            </button>
        </div>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Log In</a>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        document.getElementById('signup-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            const errorMsg = document.getElementById('signup-error');

            if (password !== confirm) {
                errorMsg.textContent = "Passwords do not match!";
                errorMsg.style.display = "block";
                return;
            }

            const btn = document.querySelector('.login-btn');
            const originalText = btn.textContent;
            btn.textContent = 'Creating Account...';
            btn.disabled = true;

            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        name: name
                    }
                }
            });

            btn.textContent = originalText;
            btn.disabled = false;

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = "block";
                return;
            }

            if (data.session) {
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.style.color = '#10B981';
                errorMsg.textContent = "Success! Please check your email to verify your account.";
                errorMsg.style.display = "block";
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            }
        });

        // OAuth Logic
        async function handleOAuth(provider) {
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: provider,
                options: {
                    redirectTo: window.location.origin + '/dashboard.html'
                }
            });

            if (error) {
                console.error(`${provider} login error:`, error.message);
                return;
            }
        }

        document.getElementById('google-login-btn').addEventListener('click', () => handleOAuth('google'));
        document.getElementById('github-login-btn').addEventListener('click', () => handleOAuth('github'));
        document.getElementById('facebook-login-btn').addEventListener('click', () => handleOAuth('facebook'));
    </script>
</body>

</html>
