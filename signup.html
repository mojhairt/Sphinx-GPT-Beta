<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Sphinx-SCA BETA</title>
    <link rel="icon" type="image/png" href="/logo.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111827;
            /* Dark theme background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #F9FAFB;
            font-family: 'Inter', sans-serif;
            background-image: none;
        }

        .auth-card {
            background: #1F2937;
            border: 1px solid #374151;
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            margin: 40px 0;
            position: relative;
        }

        .auth-header-links {
            position: absolute;
            top: 24px;
            left: 24px;
        }

        .back-home {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        .back-home:hover {
            color: var(--bg-orange);
        }

        .back-home .material-symbols-outlined {
            font-size: 18px;
        }

        .auth-logo {
            width: 80px;
            height: 80px;
            margin: 10px auto 20px;
            object-fit: contain;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.3));
        }

        .form-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #F9FAFB;
            letter-spacing: -0.5px;
        }

        .form-subtitle {
            font-size: 15px;
            color: #9CA3AF;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #D1D5DB;
            margin-bottom: 8px;
        }

        .login-input {
            width: 100%;
            height: 48px;
            border-radius: 12px;
            border: 1px solid #4B5563;
            background: #374151;
            color: #F9FAFB;
            padding: 0 16px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        .login-input:focus {
            border-color: var(--bg-orange);
            background: #1F2937;
            box-shadow: 0 0 0 3px rgba(224, 112, 46, 0.2);
        }

        .login-input::placeholder {
            color: #6B7280;
        }

        .login-btn {
            width: 100%;
            height: 50px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--bg-orange) 0%, #C15E22 100%);
            color: #FFFFFF;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(224, 112, 46, 0.3);
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(224, 112, 46, 0.4);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #6B7280;
            font-size: 12px;
            font-weight: 600;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #374151;
        }

        .auth-divider span {
            padding: 0 12px;
        }

        .oauth-container {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .oauth-btn {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: #374151;
            border: 1px solid #4B5563;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .oauth-btn:hover {
            background: #4B5563;
            border-color: #6B7280;
            transform: translateY(-2px);
        }

        .oauth-icon {
            width: 24px;
            height: 24px;
        }

        .auth-footer {
            font-size: 14px;
            color: #9CA3AF;
        }

        .auth-footer a {
            color: var(--bg-orange);
            font-weight: 600;
            text-decoration: none;
            margin-left: 4px;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            body {
                align-items: flex-start;
            }

            .auth-card {
                margin: 0;
                padding: 40px 24px 30px;
                border: none;
                border-radius: 0;
                background: transparent;
                box-shadow: none;
                max-width: 100%;
                min-height: 100vh;
            }

            .auth-header-links {
                position: relative;
                top: 0;
                left: 0;
                margin-bottom: 20px;
                justify-content: flex-start;
            }
        }
    </style>
</head>

<body class="dark-theme">

    <div class="auth-card">
        <div class="auth-header-links">
            <a href="index.html" class="back-home">
                <span class="material-symbols-outlined">arrow_back</span>
                Back
            </a>
        </div>

        <img src="logo.png" alt="Sphinx-SCA" class="auth-logo">
        <h2 class="form-title">Create Account</h2>
        <p class="form-subtitle">Register to manage your math solutions.</p>

        <form id="signup-form">
            <div class="input-group">
                <label class="input-label">Full Name</label>
                <input type="text" id="signup-name" class="login-input" placeholder="e.g. John Doe" required>
            </div>

            <div class="input-group">
                <label class="input-label">Email Address</label>
                <input type="email" id="signup-email" class="login-input" placeholder="student@university.edu" required>
            </div>

            <div class="input-group">
                <label class="input-label">Password</label>
                <input type="password" id="signup-password" class="login-input" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label class="input-label">Confirm Password</label>
                <input type="password" id="signup-confirm" class="login-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Create Account</button>
            <p id="signup-error" style="color: #EF4444; font-size: 13px; margin-top: 12px; display: none;"></p>
        </form>

        <div class="auth-divider">
            <span>OR CONTINUE WITH</span>
        </div>

        <div class="oauth-container">
            <button class="oauth-btn" id="google-login-btn" type="button" aria-label="Google" title="Google">
                <svg class="oauth-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
            </button>

            <button class="oauth-btn" id="github-login-btn" type="button" aria-label="GitHub" title="GitHub">
                <svg class="oauth-icon" viewBox="0 0 24 24">
                    <path fill="#F9FAFB"
                        d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                </svg>
            </button>

            <button class="oauth-btn" id="facebook-login-btn" type="button" aria-label="Facebook" title="Facebook">
                <svg class="oauth-icon" viewBox="0 0 24 24">
                    <path fill="#1877F2"
                        d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                </svg>
            </button>
        </div>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Log In</a>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        document.getElementById('signup-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            const errorMsg = document.getElementById('signup-error');

            if (password !== confirm) {
                errorMsg.textContent = "Passwords do not match!";
                errorMsg.style.display = "block";
                return;
            }

            // Disable button during signup
            const btn = document.querySelector('.login-btn');
            const originalText = btn.textContent;
            btn.textContent = 'Creating Account...';
            btn.disabled = true;

            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        name: name
                    }
                }
            });

            btn.textContent = originalText;
            btn.disabled = false;

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = "block";
                return;
            }

            // Redirect to login or auto-redirect if session is established
            if (data.session) {
                window.location.href = 'dashboard.html';
            } else {
                // Email confirmation might be required
                errorMsg.style.color = '#10B981';
                errorMsg.textContent = "Success! Please check your email to verify your account or proceed to log in.";
                errorMsg.style.display = "block";
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            }
        });

        // OAuth Logic (Popup mode)
        async function handleOAuth(provider) {
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: provider,
                options: { skipBrowserRedirect: true }
            });

            if (error) {
                console.error(`${provider} login error:`, error.message);
                return;
            }

            if (data && data.url) {
                const popupWidth = 500;
                const popupHeight = 600;
                const left = (window.innerWidth - popupWidth) / 2;
                const top = (window.innerHeight - popupHeight) / 2;

                const popup = window.open(
                    data.url,
                    `${provider}-oauth`,
                    `width=${popupWidth},height=${popupHeight},left=${left},top=${top}`
                );

                const { data: authListener } = supabase.auth.onAuthStateChange((event, session) => {
                    if (event === 'SIGNED_IN' || session) {
                        if (popup && !popup.closed) {
                            popup.close();
                        }
                        window.location.href = 'dashboard.html';
                    }
                });
            }
        }

        document.getElementById('google-login-btn').addEventListener('click', () => handleOAuth('google'));
        document.getElementById('github-login-btn').addEventListener('click', () => handleOAuth('github'));
        document.getElementById('facebook-login-btn').addEventListener('click', () => handleOAuth('facebook'));
    </script>
</body>

</html>
